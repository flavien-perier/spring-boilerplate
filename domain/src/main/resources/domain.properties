spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:${POSTGRES_URL:postgresql://127.0.0.1:5432/admin}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.liquibase.user=${POSTGRES_USER:admin}
spring.liquibase.password=${POSTGRES_PASSWORD:password}

spring.data.redis.host=${VALKEY_HOST:127.0.0.1}
spring.data.redis.port=${VALKEY_PORT:6379}
spring.data.redis.password=${VALKEY_PASSWORD:password}

spring.mail.host=${SMTP_HOST:127.0.0.1}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:no}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:no}

flavien-io.mail.account-creator=${MAIL_ACCOUNT_CREATOR:no-reply@flavien.io}
flavien-io.mail.domain-links=${MAIL_DOMAIN_LINKS:https://flavien.io:443}

flavien-io.application.min-password-length=12

# Resilience4j — Redis circuit breaker
resilience4j.circuitbreaker.instances.redis.register-health-indicator=true
resilience4j.circuitbreaker.instances.redis.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.redis.sliding-window-size=20
resilience4j.circuitbreaker.instances.redis.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.redis.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.redis.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.redis.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.redis.record-exceptions=redis.clients.jedis.exceptions.JedisConnectionException,org.springframework.data.redis.RedisConnectionFailureException

# Resilience4j — Mail retry
resilience4j.retry.instances.mailSend.max-attempts=3
resilience4j.retry.instances.mailSend.wait-duration=500ms
resilience4j.retry.instances.mailSend.retry-exceptions=org.springframework.mail.MailException