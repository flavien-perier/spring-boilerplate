spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

spring.liquibase.enabled=false
spring.data.redis.repositories.enabled=false

flavien-io.application.min-password-length=12

# Multi-tenancy
flavien-io.tenants.directory=${TENANTS_DIRECTORY:/etc/tenants}

# The Redis connection requires a tenant context, which actuator probes do not have
management.health.redis.enabled=false

# Resilience4j — mail retry: 3 attempts, 500 ms fixed back-off, only on SMTP errors
resilience4j.retry.instances.mail.max-attempts=3
resilience4j.retry.instances.mail.wait-duration=500ms
resilience4j.retry.instances.mail.retry-exceptions=org.springframework.mail.MailException

# Resilience4j — mail circuit breaker: open after 50 % failures over a 10-call window, stay open 60 s
resilience4j.circuitbreaker.instances.mail.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mail.sliding-window-size=10
resilience4j.circuitbreaker.instances.mail.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.mail.permitted-number-of-calls-in-half-open-state=2
