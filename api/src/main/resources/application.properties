spring.config.import=classpath:domain.properties

# HTTP server
server.port=8080
spring.web.error.whitelabel.enabled=false

# Web MVC
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/

# Documentation
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Application
spring.application.name=demo
spring.threads.virtual.enabled=true
spring.docker.compose.enabled=false
spring.jpa.open-in-view=true

# Management / Actuator
management.server.port=8081
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
# Redis is excluded: the tenant-aware Redis connection factory requires a tenant
# context, which actuator probes do not have (management.health.redis.enabled=false).
management.endpoint.health.group.readiness.include=readinessState,db
management.health.diskspace.enabled=false
management.health.mail.enabled=false
