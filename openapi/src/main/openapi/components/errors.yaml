ProblemDetailDto:
  type: object
  description: RFC 9457 problem detail error response body.
  required:
    - status
    - title
    - detail
    - instance
  properties:
    status:
      type: integer
      description: HTTP status code.
    title:
      type: string
      description: HTTP status reason phrase (e.g. "Unauthorized").
    detail:
      type: string
      description: Human-readable error message.
    instance:
      type: string
      description: The request URI path that produced the error.

BadRequest:
  description: Validation failure.
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"

Unauthorized:
  description: Missing or expired token.
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"

Forbidden:
  description: Insufficient role.
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"

NotFound:
  description: Resource not found.
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"

Conflict:
  description: Resource conflict (e.g. duplicate email or already-used token).
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"

InternalServerError:
  description: Generic server error.
  content:
    application/problem+json:
      schema:
        $ref: "#/ProblemDetailDto"
