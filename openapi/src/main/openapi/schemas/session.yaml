LoginDto:
  type: object
  description: Authentication information.
  required:
    - email
    - password
    - proofOfWork
  properties:
    email:
      $ref: "common.yaml#/email"
    password:
      $ref: "common.yaml#/password"
    proofOfWork:
      $ref: "common.yaml#/proofOfWork"
    otp:
      $ref: "common.yaml#/otp"

SessionDto:
  type: object
  description: Authentication Session.
  required:
    - accessToken
  properties:
    refreshToken:
      $ref: "common.yaml#/refreshToken"
    accessToken:
      $ref: "common.yaml#/accessToken"

SessionWebDto:
  type: object
  description: Authentication Session.
  required:
    - accessToken
  properties:
    accessToken:
      $ref: "common.yaml#/accessToken"

SessionRenewalDto:
  type: object
  description: Information required to renew a session.
  required:
    - email
    - refreshToken
  properties:
    email:
      $ref: "common.yaml#/email"
    refreshToken:
      $ref: "common.yaml#/refreshToken"

SessionRenewalWebDto:
  type: object
  description: Information required to renew a session with token.
  required:
    - email
  properties:
    email:
      $ref: "common.yaml#/email"

RefreshTokenPropertiesDto:
  type: object
  description: Information identifying a refresh token.
  required:
    - uuid
    - creationDate
  properties:
    uuid:
      $ref: "common.yaml#/uuid"
    creationDate:
      type: string
      format: date-time

RefreshTokenPropertiesPageDto:
  description: A page of refresh token properties.
  allOf:
    - $ref: "page.yaml#/Page"
    - type: object
      required:
        - content
      properties:
        content:
          type: array
          description: The refresh token properties content of this page.
          items:
            $ref: "#/RefreshTokenPropertiesDto"
