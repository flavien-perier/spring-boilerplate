Page:
  type: object
  description: A page of results mirroring Spring's org.springframework.data.domain.Page metadata. The `number` field is 0-indexed (Spring convention) while `page` query parameters are 1-indexed.
  required:
    - totalElements
    - totalPages
    - number
    - size
  properties:
    totalElements:
      type: integer
      format: int64
      description: Total number of elements across all pages.
      minimum: 0
    totalPages:
      type: integer
      format: int32
      description: Total number of pages.
      minimum: 0
    number:
      type: integer
      format: int32
      description: The page number (0-indexed).
      minimum: 0
    size:
      type: integer
      format: int32
      description: The page size.
      minimum: 0
