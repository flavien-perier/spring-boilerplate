UserCreationDto:
  type: object
  description: An account of an user or an organization.
  required:
    - email
    - password
    - proofOfWork
  properties:
    email:
      $ref: "common.yaml#/email"
    password:
      $ref: "common.yaml#/password"
    proofOfWork:
      $ref: "common.yaml#/proofOfWork"

UserUpdateDto:
  type: object
  description: An account of an user or an organization.
  properties:
    email:
      $ref: "common.yaml#/email"
    password:
      $ref: "common.yaml#/password"
    proofOfWork:
      $ref: "common.yaml#/proofOfWork"

ChangePasswordDto:
  type: object
  description: Change password after forgetting it.
  required:
    - token
    - password
    - proofOfWork
  properties:
    token:
      $ref: "common.yaml#/token"
    password:
      $ref: "common.yaml#/password"
    proofOfWork:
      $ref: "common.yaml#/proofOfWork"

OtpSetupDto:
  type: object
  description: OTP setup response containing the provisioning URI.
  required:
    - uri
  properties:
    uri:
      $ref: "common.yaml#/otpUri"

OtpConfirmDto:
  type: object
  description: OTP confirmation request.
  required:
    - otp
  properties:
    otp:
      $ref: "common.yaml#/otp"

UserDto:
  type: object
  description: An account of an user or an organization.
  required:
    - email
    - otpEnabled
  properties:
    email:
      $ref: "common.yaml#/email"
    lastLogin:
      type: string
      format: date-time
      description: The date and time of the last login.
    otpEnabled:
      type: boolean
      description: Whether OTP 2FA is active for this user.

UserExportDto:
  type: object
  description: User personal data exported for GDPR data portability.
  required:
    - email
    - enabled
    - lastLogin
    - creationDate
    - updateDate
    - otpEnabled
  properties:
    email:
      $ref: "common.yaml#/email"
    enabled:
      type: boolean
      description: Whether the account is enabled.
    lastLogin:
      type: string
      format: date-time
      description: The date and time of the last login.
    creationDate:
      type: string
      format: date-time
      description: The date and time of the account creation.
    updateDate:
      type: string
      format: date-time
      description: The date and time of the last account update.
    otpEnabled:
      type: boolean
      description: Whether OTP 2FA is active for this user.

UserUpdateAdminDto:
  type: object
  description: An account of an user or an organization.
  properties:
    email:
      $ref: "common.yaml#/email"
    password:
      $ref: "common.yaml#/password"
    proofOfWork:
      $ref: "common.yaml#/proofOfWork"

UserPageDto:
  type: object
  description: A page of user.
  required:
    - totalElements
    - totalPages
    - content
  properties:
    totalElements:
      type: integer
      description: Total elements.
      minimum: 0
      format: int64
    totalPages:
      type: integer
      description: Total pages.
      minimum: 0
      format: int32
    content:
      type: array
      description: Content.
      items:
        $ref: "#/UserDto"

ForgotPasswordDto:
  type: object
  description: Request to send a password reset email.
  required:
    - email
  properties:
    email:
      $ref: "common.yaml#/email"
