/api/user:
  post:
    tags:
      - User
    summary: Creation of a new account for an user.
    operationId: createUser
    requestBody:
      description: User account information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../index.yaml#/components/schemas/UserCreationDto"
    responses:
      "204":
        description: User created.

/api/user/activate:
  post:
    tags:
      - User
    summary: Activate a user after creation using the token sent by email.
    operationId: activateUser
    parameters:
      - name: token
        description: Activation token sent by email.
        in: query
        required: true
        schema:
          $ref: "../schemas/common.yaml#/token"
    responses:
      "204":
        description: The user has been activated.

/api/user/password:
  get:
    tags:
      - User
    summary: Send a token by email to change password.
    operationId: forgotPassword
    parameters:
      - name: email
        description: Email address to which to send the token.
        in: query
        required: true
        schema:
          $ref: "../schemas/common.yaml#/email"
    responses:
      "204":
        description: The email has been sent.

  post:
    tags:
      - User
    summary: Use the token sent by email to change password.
    operationId: updatePassword
    requestBody:
      description: The new password and token.
      required: true
      content:
        application/json:
          schema:
            $ref: "../index.yaml#/components/schemas/ChangePasswordDto"
    responses:
      "204":
        description: User created.

/api/user/me:
  get:
    tags:
      - User
    summary: Returns the user sending the request.
    operationId: getUserMe
    responses:
      "200":
        description: The user.
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/UserDto"
    security:
      - bearer: [ user, admin ]

  put:
    tags:
      - User
    summary: Modifies the user sending the request.
    operationId: updateUserMe
    requestBody:
      description: User account information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../index.yaml#/components/schemas/UserUpdateDto"
    responses:
      "200":
        description: The user.
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/UserDto"
    security:
      - bearer: [ user, admin ]

  delete:
    tags:
      - User
    summary: Deletes the user sending the request.
    operationId: deleteUserMe
    responses:
      "204":
        description: The user has been deleted.
    security:
      - bearer: [ user ]

/api/users:
  get:
    tags:
      - User
    summary: Returns a list of users.
    operationId: findUsers
    parameters:
      - name: q
        description: Partial search of the user's email address.
        in: query
        required: false
        schema:
          type: string
          maxLength: 100
          pattern: ^[^$\[\]"`\\]*$
      - name: page
        description: Page number.
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000000
      - name: pageSize
        description: Number of elements per page.
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1000000
      - name: sortColumn
        description: Indicates which column will be used for sorting.
        in: query
        required: false
        schema:
          type: string
          enum: [ email, firstname, lastname ]
      - name: sortOrder
        description: Order of the sorting function.
        in: query
        required: false
        schema:
          type: string
          enum: [ asc, desc ]
    responses:
      "200":
        description: The subscription type list.
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/UserPageDto"
    security:
      - bearer: [ admin ]
