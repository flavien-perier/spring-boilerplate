/api/groups:
  get:
    tags:
      - Group
    summary: Returns a list of groups.
    operationId: findGroups
    responses:
      "200":
        description: List of groups.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/group.yaml#/GroupDto"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]
  post:
    tags:
      - Group
    summary: Creation of a new group.
    operationId: createGroup
    requestBody:
      description: Group information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/group.yaml#/GroupCreationDto"
    responses:
      "200":
        description: The group.
        content:
          application/json:
            schema:
              $ref: "../schemas/group.yaml#/GroupDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "409":
        $ref: "../components/errors.yaml#/Conflict"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]

/api/groups/{groupId}:
  get:
    tags:
      - Group
    summary: Returns information about a group.
    operationId: getGroup
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
    responses:
      "200":
        description: The group.
        content:
          application/json:
            schema:
              $ref: "../schemas/group.yaml#/GroupDto"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]
  put:
    tags:
      - Group
    summary: Updating information about a group.
    operationId: updateGroup
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
    requestBody:
      description: Group information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/group.yaml#/GroupUpdateDto"
    responses:
      "200":
        description: The group.
        content:
          application/json:
            schema:
              $ref: "../schemas/group.yaml#/GroupDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "409":
        $ref: "../components/errors.yaml#/Conflict"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]
  delete:
    tags:
      - Group
    summary: Deleting a group.
    operationId: deleteGroup
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
    responses:
      "204":
        description: The group has been deleted.
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]

/api/groups/{groupId}/permissions:
  get:
    tags:
      - Group
    summary: Returns the permission settings of a group.
    operationId: getGroupPermissions
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
    responses:
      "200":
        description: List of permission settings.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/permission.yaml#/PermissionSettingDto"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]

/api/groups/{groupId}/permissions/{permission}:
  put:
    tags:
      - Group
    summary: Set a permission override on a group.
    operationId: setGroupPermission
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
      - $ref: "../components/parameters.yaml#/permissionName"
    requestBody:
      description: The permission override.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/permission.yaml#/PermissionUpdateDto"
    responses:
      "204":
        description: The permission has been set.
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]
  delete:
    tags:
      - Group
    summary: Remove a permission override from a group.
    operationId: removeGroupPermission
    parameters:
      - $ref: "../components/parameters.yaml#/groupId"
      - $ref: "../components/parameters.yaml#/permissionName"
    responses:
      "204":
        description: The permission override has been removed.
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "403":
        $ref: "../components/errors.yaml#/Forbidden"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_ALL_GROUPS ]
