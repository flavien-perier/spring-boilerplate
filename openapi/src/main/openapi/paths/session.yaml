/api/session/login:
  post:
    tags:
      - Session
    summary: User authentication with tokens.
    operationId: login
    requestBody:
      description: Authentication information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/session.yaml#/LoginDto"
    responses:
      "200":
        description: Session values.
        content:
          application/json:
            schema:
              $ref: "../schemas/session.yaml#/SessionDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"

/api/session/login/web:
  post:
    tags:
      - Session
    summary: User authentication with cookies for web applications.
    operationId: loginWeb
    requestBody:
      description: Authentication information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/session.yaml#/LoginDto"
    responses:
      "200":
        description: Session values.
        content:
          application/json:
            schema:
              $ref: "../schemas/session.yaml#/SessionWebDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"

/api/session/logout:
  delete:
    tags:
      - Session
    summary: Delete current session.
    operationId: logout
    responses:
      "204":
        description: Session deleted.
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_OWN_SESSIONS ]

/api/session/renew:
  post:
    tags:
      - Session
    summary: Renewing a session with token.
    operationId: renewSession
    requestBody:
      description: Session information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/session.yaml#/SessionRenewalDto"
    responses:
      "200":
        description: Session values.
        content:
          application/json:
            schema:
              $ref: "../schemas/session.yaml#/SessionDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"

/api/session/renew/web:
  post:
    tags:
      - Session
    summary: Renewing a session with cookie.
    operationId: renewSessionWeb
    parameters:
      - name: refresh_token
        in: cookie
        description: The cookie with refresh token.
        required: true
        schema:
          type: string
    requestBody:
      description: Session information.
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/session.yaml#/SessionRenewalWebDto"
    responses:
      "200":
        description: Session values.
        content:
          application/json:
            schema:
              $ref: "../schemas/session.yaml#/SessionWebDto"
      "400":
        $ref: "../components/errors.yaml#/BadRequest"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"

/api/sessions:
  get:
    tags:
      - Session
    summary: Lists the user's active sessions.
    operationId: findSessions
    responses:
      "200":
        description: Session list.
        content:
          application/json:
            schema:
              type: array
              description: List of active refresh tokens.
              items:
                $ref: "../schemas/session.yaml#/RefreshTokenPropertiesDto"
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_OWN_SESSIONS ]

/api/sessions/{sessionUuid}:
  delete:
    tags:
      - Session
    summary: Delete a session via its uuid.
    operationId: deleteSession
    parameters:
      - $ref: "../components/parameters.yaml#/sessionUuid"
    responses:
      "204":
        description: Session deleted.
      "401":
        $ref: "../components/errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/errors.yaml#/NotFound"
      "500":
        $ref: "../components/errors.yaml#/InternalServerError"
    security:
      - bearer: [ MANAGE_OWN_SESSIONS ]
