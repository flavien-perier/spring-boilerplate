apiVersion: batch/v1
kind: CronJob
metadata:
  name: user-cleanup-batch
  labels:
    app: {{ .Values.appName }}
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          {{- if .Values.database.embedded }}
          initContainers:
            - name: wait-for-database
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nc -z database 5432; do
                    echo "Waiting for database..."
                    sleep 2
                  done
            - name: wait-for-valkey
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nc -z valkey 6379; do
                    echo "Waiting for Valkey..."
                    sleep 2
                  done
          {{- end }}
          containers:
            - name: batch
              image: "{{ .Values.registry }}/{{ .Values.batch.image }}:{{ .Values.batch.imageTag }}"
              imagePullPolicy: Always
              env:
                - name: POSTGRES_URL
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: POSTGRES_URL
                - name: POSTGRES_USER
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: application-secret
                      key: DATABASE_PASSWORD
                - name: VALKEY_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: VALKEY_HOST
                - name: VALKEY_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: VALKEY_PORT
                - name: VALKEY_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: application-secret
                      key: VALKEY_PASSWORD
                - name: SMTP_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: SMTP_HOST
                - name: SMTP_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: SMTP_PORT
                - name: SMTP_USERNAME
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: SMTP_USERNAME
                - name: SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: application-secret
                      key: SMTP_PASSWORD
                - name: SMTP_AUTH
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: SMTP_AUTH
                - name: SMTP_STARTTLS
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: SMTP_STARTTLS
                - name: MAIL_ACCOUNT_CREATOR
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: MAIL_ACCOUNT_CREATOR
                - name: MAIL_DOMAIN_LINKS
                  valueFrom:
                    configMapKeyRef:
                      name: application-config
                      key: MAIL_DOMAIN_LINKS
