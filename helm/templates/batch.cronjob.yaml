apiVersion: batch/v1
kind: CronJob
metadata:
  name: user-cleanup-batch
  labels:
    app: {{ .Values.appName }}
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          {{- if .Values.database.embedded }}
          initContainers:
            - name: wait-for-database
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nc -z database 5432; do
                    echo "Waiting for database..."
                    sleep 2
                  done
            - name: wait-for-valkey
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nc -z valkey 6379; do
                    echo "Waiting for Valkey..."
                    sleep 2
                  done
          {{- end }}
          {{- if .Values.tenants.list }}
          volumes:
            - name: tenants-volume
              secret:
                secretName: tenants-config
          {{- end }}
          containers:
            - name: batch
              image: "{{ .Values.registry }}/{{ .Values.batch.image }}:{{ .Values.batch.imageTag }}"
              imagePullPolicy: Always
              {{- if .Values.tenants.list }}
              volumeMounts:
                - name: tenants-volume
                  mountPath: {{ .Values.tenants.mountPath }}
                  readOnly: true
              {{- end }}
              env:
                - name: TENANTS_DIRECTORY
                  value: {{ .Values.tenants.mountPath | quote }}
