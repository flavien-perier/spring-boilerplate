apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
  labels:
    app: {{ .Values.appName }}
spec:
  replicas: {{ .Values.application.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
      tier: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        tier: application
    spec:
      {{- if .Values.database.embedded }}
      initContainers:
        - name: wait-for-database
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z database 5432; do
                echo "Waiting for database to be ready..."
                sleep 2
              done
              echo "Database is ready!"
        - name: wait-for-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z valkey 6379; do
                echo "Waiting for Valkey to be ready..."
                sleep 2
              done
              echo "Valkey is ready!"
      {{- end }}
      {{- if .Values.tenants.list }}
      volumes:
        - name: tenants-volume
          secret:
            secretName: tenants-config
      {{- end }}
      containers:
        - name: application
          image: "{{ .Values.registry }}/{{ .Values.application.image }}:{{ .Values.application.imageTag }}"
          imagePullPolicy: Always

          {{- if .Values.tenants.list }}
          volumeMounts:
            - name: tenants-volume
              mountPath: {{ .Values.tenants.mountPath }}
              readOnly: true
          {{- end }}
          env:
            - name: TENANTS_DIRECTORY
              value: {{ .Values.tenants.mountPath | quote }}

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: management
              protocol: TCP

          resources:
            requests:
              memory: {{ .Values.application.resources.requests.memory }}
              cpu: {{ .Values.application.resources.requests.cpu }}
            limits:
              memory: {{ .Values.application.resources.limits.memory }}
              cpu: {{ .Values.application.resources.limits.cpu }}

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
