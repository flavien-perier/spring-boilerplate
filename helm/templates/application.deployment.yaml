apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
  labels:
    app: {{ .Values.appName }}
spec:
  replicas: {{ .Values.application.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
      tier: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        tier: application
    spec:
      {{- if .Values.database.embedded }}
      initContainers:
        - name: wait-for-database
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z database 5432; do
                echo "Waiting for database to be ready..."
                sleep 2
              done
              echo "Database is ready!"
        - name: wait-for-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z valkey 6379; do
                echo "Waiting for Valkey to be ready..."
                sleep 2
              done
              echo "Valkey is ready!"
      {{- end }}
      containers:
        - name: application
          image: "{{ .Values.registry }}/{{ .Values.image }}:{{ .Values.imageTag }}"
          imagePullPolicy: Always

          env:
            # Database configuration
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: POSTGRES_URL
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-secret
                  key: DATABASE_PASSWORD

            # Valkey/Redis configuration
            - name: VALKEY_HOST
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: VALKEY_HOST
            - name: VALKEY_PORT
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: VALKEY_PORT
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-secret
                  key: VALKEY_PASSWORD

            # SMTP configuration
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-secret
                  key: SMTP_PASSWORD
            - name: SMTP_AUTH
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: SMTP_AUTH
            - name: SMTP_STARTTLS
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: SMTP_STARTTLS

            # Application custom configuration
            - name: MAIL_ACCOUNT_CREATOR
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: MAIL_ACCOUNT_CREATOR
            - name: MAIL_DOMAIN_LINKS
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: MAIL_DOMAIN_LINKS

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: management
              protocol: TCP

          resources:
            requests:
              memory: {{ .Values.application.resources.requests.memory }}
              cpu: {{ .Values.application.resources.requests.cpu }}
            limits:
              memory: {{ .Values.application.resources.limits.memory }}
              cpu: {{ .Values.application.resources.limits.cpu }}

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
